<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AllTick WebSocket Playground</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #1e293b; padding: 24px; }
.container { max-width: 960px; margin: 0 auto; }
h1 { font-size: 20px; font-weight: 600; margin-bottom: 20px; color: #1e293b; }
.section { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
.section-title { font-size: 13px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
.row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
label { font-size: 13px; color: #475569; font-weight: 500; }
input, select { height: 36px; padding: 0 12px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 14px; outline: none; transition: border-color 0.2s; }
input:focus, select:focus { border-color: #2563eb; }
input[type="text"] { flex: 1; min-width: 200px; }
select { min-width: 180px; }
button { height: 36px; padding: 0 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: #2563eb; color: #fff; }
.btn-primary:hover { background: #1d4ed8; }
.btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
.btn-danger { background: #ef4444; color: #fff; }
.btn-danger:hover { background: #dc2626; }
.btn-secondary { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
.btn-secondary:hover { background: #e2e8f0; }
.btn-small { height: 30px; padding: 0 10px; font-size: 12px; }
.status { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: #64748b; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #94a3b8; }
.status-dot.connected { background: #22c55e; }
.status-dot.connecting { background: #f59e0b; }
.templates { display: flex; gap: 8px; flex-wrap: wrap; }
textarea { width: 100%; height: 120px; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace; font-size: 13px; resize: vertical; outline: none; line-height: 1.5; }
textarea:focus { border-color: #2563eb; }
.log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.log { height: 350px; overflow-y: auto; background: #0f172a; border-radius: 6px; padding: 12px; font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace; font-size: 12px; line-height: 1.6; }
.log-entry { margin-bottom: 4px; }
.log-time { color: #64748b; }
.log-send { color: #38bdf8; }
.log-recv { color: #4ade80; }
.log-info { color: #fbbf24; }
.log-error { color: #f87171; }
.send-row { display: flex; gap: 8px; margin-top: 12px; }
</style>
</head>
<body>
<div class="container">
<h1>WebSocket Playground</h1>

<div class="section">
<div class="section-title">Connection</div>
<div class="row">
<label>Token:</label>
<input type="text" id="token" placeholder="YOUR_TOKEN_HERE">
<label>Endpoint:</label>
<select id="endpoint">
<option value="wss://quote.alltick.co/quote-b-ws-api">Forex / Crypto</option>
<option value="wss://quote.alltick.co/quote-stock-b-ws-api">Stock</option>
</select>
<button class="btn-primary" id="connectBtn" onclick="connect()">Connect</button>
<button class="btn-danger" id="disconnectBtn" onclick="disconnect()" style="display:none">Disconnect</button>
<span class="status"><span class="status-dot" id="statusDot"></span><span id="statusText">Disconnected</span></span>
</div>
</div>

<div class="section">
<div class="section-title">Message</div>
<div class="templates" id="templates"></div>
<textarea id="message" spellcheck="false"></textarea>
<div class="send-row">
<button class="btn-primary" id="sendBtn" disabled onclick="sendMessage()">Send</button>
</div>
</div>

<div class="section">
<div class="log-header">
<div class="section-title" style="margin-bottom:0">Log</div>
<button class="btn-secondary btn-small" onclick="clearLog()">Clear</button>
</div>
<div class="log" id="log"></div>
</div>
</div>
<script>
let ws = null;
let heartbeatTimer = null;
let seqId = 1;

const templates = [
  { name: 'Heartbeat', msg: () => ({ cmd_id: 22000, seq_id: seqId++, trace: genTrace(), data: {} }) },
  { name: 'Subscribe Trade', msg: () => ({ cmd_id: 22004, seq_id: seqId++, trace: genTrace(), data: { symbol_list: [{ code: 'BTCUSDT' }, { code: 'ETHUSDT' }] } }) },
  { name: 'Subscribe Depth', msg: () => ({ cmd_id: 22002, seq_id: seqId++, trace: genTrace(), data: { symbol_list: [{ code: 'BTCUSDT', depth_level: 5 }, { code: 'ETHUSDT', depth_level: 5 }] } }) },
  { name: 'Cancel All', msg: () => ({ cmd_id: 22006, seq_id: seqId++, trace: genTrace(), data: { cancel_type: 0 } }) }
];

function genTrace() { return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2) + Date.now(); }

function initTemplates() {
  const container = document.getElementById('templates');
  templates.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn-secondary btn-small';
    btn.textContent = t.name;
    btn.onclick = () => { document.getElementById('message').value = JSON.stringify(t.msg(), null, 2); };
    container.appendChild(btn);
  });
  document.getElementById('message').value = JSON.stringify(templates[1].msg(), null, 2);
}

function log(type, text) {
  const el = document.getElementById('log');
  const time = new Date().toLocaleTimeString();
  const cls = { send: 'log-send', recv: 'log-recv', info: 'log-info', error: 'log-error' }[type] || 'log-info';
  const prefix = { send: '→', recv: '←', info: 'ℹ', error: '✗' }[type] || '';
  el.innerHTML += `<div class="log-entry"><span class="log-time">${time}</span> <span class="${cls}">${prefix} ${escapeHtml(text)}</span></div>`;
  el.scrollTop = el.scrollHeight;
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function clearLog() { document.getElementById('log').innerHTML = ''; }

function setStatus(state) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.className = 'status-dot ' + state;
  text.textContent = { connected: 'Connected', connecting: 'Connecting...', '': 'Disconnected' }[state] || 'Disconnected';
  document.getElementById('connectBtn').style.display = state === 'connected' ? 'none' : '';
  document.getElementById('disconnectBtn').style.display = state === 'connected' ? '' : 'none';
  document.getElementById('sendBtn').disabled = state !== 'connected';
}

function connect() {
  const token = document.getElementById('token').value.trim();
  if (!token) { log('error', 'Please enter your token'); return; }
  const base = document.getElementById('endpoint').value;
  const url = base + '?token=' + encodeURIComponent(token);
  setStatus('connecting');
  log('info', 'Connecting to ' + base + '...');
  ws = new WebSocket(url);
  ws.onopen = () => { setStatus('connected'); log('info', 'Connected'); startHeartbeat(); };
  ws.onmessage = (e) => { log('recv', e.data); };
  ws.onerror = () => { log('error', 'Connection error'); };
  ws.onclose = (e) => { setStatus(''); log('info', 'Disconnected (code: ' + e.code + ')'); stopHeartbeat(); ws = null; };
}

function disconnect() { if (ws) ws.close(); }

function sendMessage() {
  const text = document.getElementById('message').value.trim();
  if (!text || !ws) return;
  ws.send(text);
  log('send', text);
}

function startHeartbeat() {
  stopHeartbeat();
  heartbeatTimer = setInterval(() => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      const msg = JSON.stringify({ cmd_id: 22000, seq_id: seqId++, trace: genTrace(), data: {} });
      ws.send(msg);
      log('send', '[auto-heartbeat] ' + msg);
    }
  }, 10000);
}

function stopHeartbeat() { if (heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null; } }

initTemplates();
</script>
</body>
</html>
